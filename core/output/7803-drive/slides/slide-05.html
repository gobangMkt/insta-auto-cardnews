<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .outer {
    position:absolute;
    width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:45.25px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:center; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .hl-text {
    font-weight:800; font-size:57.61px; line-height:68.78px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED;
    flex-shrink:0;
  }
  .slide-img {
    width:934px; height:423.54px;
    border-radius:27.15px;
    object-fit:cover;
    background:#D9D9D9;
    flex-shrink:0;
  }
  .content-group {
    display:flex; flex-direction:column; align-items:flex-start; gap:20px;
    width:933.96px;
  }
  .paragraph {
    display:flex; flex-direction:column; align-items:flex-start; gap:18.1px;
    width:933.96px;
  }
  .item-row {
    display:flex; flex-direction:row; align-items:center; gap:18.1px;
  }
  .rank-badge {
    min-width:81.45px; height:65.16px;
    background:rgba(0,154,181,0.2); border-radius:18.1px;
    display:inline-flex; align-items:center; justify-content:center;
    padding:0 16px;
    font-weight:700; font-size:43.44px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .group-title {
    width:933.96px;
    font-weight:700; font-size:43.44px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .body {
    width:933.96px;
    font-weight:400; font-size:43.44px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="outer">
    <div class="headline">
      <div class="hl-icon">🔑</div>
      <div class="hl-text">유지할까요, 해지할까요?</div>
    </div>
    <div class="content-divider"></div>
    <img class="slide-img" src="../img/8eb77f7a-ae92-4696-8706-9520bfc5c434.webp" alt="">
    <div class="content-group">
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">유지</div>
          <div class="group-title">이 조건이라면 기다려요</div>
        </div>
        <div class="body"><span class="highlight">특공 자격·높은 가점</span>이 있다면 청약은 아직 유효한 전략이에요. 향후 이사 계획도 있다면 더욱 유리해요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">해지</div>
          <div class="group-title">이 상황이라면 고려해요</div>
        </div>
        <div class="body">납입 부담이 크고 <span class="highlight">10년 내 청약 계획이 없다면</span> 해지도 합리적인 선택이에요.</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
