<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute;
    width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:57.92px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:flex-start; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED; flex-shrink:0;
  }
  .paragraph {
    display:flex; flex-direction:column; align-items:flex-start; gap:57.92px;
    width:936.08px;
  }
  .body-text {
    width:936.08px;
    font-weight:400; font-size:43.44px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .cell-img {
    width:924.91px; height:423.54px;
    border-radius:27.15px;
    object-fit:cover;
    background:#D9D9D9;
    flex-shrink:0;
  }
  .bullets {
    display:flex; flex-direction:column; gap:9.05px;
    width:936.08px; padding-left:18.1px;
  }
  .bullet-item {
    position:relative; padding-left:32.41px;
    font-weight:400; font-size:39.61px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .bullet-item::before {
    content:'•'; position:absolute;
    left:0; top:0; font-weight:700; color:#1E2124;
  }
  .bullet-item b { font-weight:700; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">📌</div>
      <div class="headline-text">수도권에선 무슨 일이?</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraph">
      <p class="body-text">이탈자 10명 중 <span class="highlight">8명은 수도권 거주자</span>예요. 경쟁은 더 치열해졌고, 현실적인 당첨 가능성이 낮아졌어요.</p>
      <img class="cell-img" src="../img/5cf4368d-f20d-4d4e-865c-8e3017cfc1e7.webp" alt="">
      <div class="bullets">
        <div class="bullet-item"><b>경쟁 심화:</b> 평균 가점 70점 이상 필요해요</div>
        <div class="bullet-item"><b>특공 없으면:</b> 일반 청약 당첨은 매우 어려워요</div>
      </div>
      <p class="body-text"><span class="highlight">가점이 낮다면</span> 지방·비수도권 청약도 함께 검토해봐요.</p>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
