<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:flex-start; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED; flex-shrink:0;
  }
  .paragraph {
    display:flex; flex-direction:column; align-items:flex-start; gap:63.35px;
    width:936.08px;
  }
  .body-text {
    width:936.08px;
    font-weight:400; font-size:43.44px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .callout {
    width:936.08px;
    display:flex; flex-direction:column; justify-content:center; align-items:flex-start;
    padding:43.21px 43.21px 46.81px; gap:14.41px;
    background:#E6F5EC; border-radius:21.6px;
  }
  .callout-title {
    display:flex; flex-direction:row; align-items:center; gap:14.41px; width:100%;
  }
  .callout-check {
    width:50.41px; height:50.41px; flex-shrink:0;
    background:#29BA66; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#FFFFFF; font-size:28px; font-weight:700;
  }
  .callout-title-text {
    font-weight:700; font-size:38.71px; line-height:160%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .callout-body {
    width:100%; padding-left:10.8px;
    font-weight:400; font-size:39.61px; line-height:160%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">💡</div>
      <div class="headline-text">지금 당장 결정 안 해도 돼요</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraph">
      <p class="body-text">12만 명이 해지를 선택했지만, 그 결정이 모두에게 맞는 건 아니에요. <span class="highlight">내 가점과 계획에 따라</span> 청약통장은 여전히 강력한 도구가 될 수 있어요.</p>
      <div class="callout">
        <div class="callout-title">
          <div class="callout-check">✓</div>
          <div class="callout-title-text">오늘의 핵심 정리</div>
        </div>
        <div class="callout-body">
          · 3단 콤보(고금리·고분양가·대출규제)로 해지 급증<br>
          · 수도권 이탈자 80%, 로또 청약 기대감 약화<br>
          · 유지 vs 해지: 특공 자격·가점·계획으로 판단
        </div>
      </div>
      <p class="body-text">오늘 한 번, <span class="highlight">내 청약 가점부터 확인</span>해봐요.</p>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
