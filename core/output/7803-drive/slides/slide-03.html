<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute;
    width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:center; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .hl-text {
    font-weight:800; font-size:57.61px; line-height:68.78px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED; flex-shrink:0;
  }
  .paragraphs {
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
    width:936.08px;
  }
  .paragraph {
    display:flex; flex-direction:column; align-items:flex-start; gap:18.1px;
    width:936.08px;
  }
  .item-row {
    display:flex; flex-direction:row; align-items:center; gap:18.1px;
    width:936.08px;
  }
  .rank-badge {
    min-width:81.45px; height:65.16px;
    background:rgba(0,154,181,0.2); border-radius:18.1px;
    display:inline-flex; align-items:center; justify-content:center;
    padding:0 16px; flex-shrink:0;
    font-weight:700; font-size:43.44px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .group-title {
    font-weight:700; font-size:43.44px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .body {
    width:936.08px;
    font-weight:400; font-size:43.44px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .bullets {
    display:flex; flex-direction:column; gap:9.05px;
    width:936.08px; padding-left:18.1px;
  }
  .bullet-item {
    position:relative; padding-left:32.41px;
    font-weight:400; font-size:39.61px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .bullet-item::before {
    content:'•'; position:absolute;
    left:0; top:0; font-weight:700; color:#1E2124;
  }
  .bullet-item b { font-weight:700; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">📊</div>
      <div class="hl-text">왜 해지가 늘었나요?</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraphs">
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">원인①</div>
          <div class="group-title">3단 콤보가 동시에 터졌어요</div>
        </div>
        <div class="body">고금리·고분양가·대출 규제라는 세 악재가 한꺼번에 겹쳤어요. <span class="highlight">당첨돼도 자금을 못 맞추는 상황</span>이 생기면서 포기가 늘었어요.</div>
        <div class="bullets">
          <div class="bullet-item"><b>고금리:</b> 모기지 이자 부담 급증</div>
          <div class="bullet-item"><b>고분양가:</b> 청약 자금 필요액 증가</div>
          <div class="bullet-item"><b>대출 규제:</b> 자금 조달 경로 축소</div>
        </div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">원인②</div>
          <div class="group-title">로또 청약 기대감이 꺾였어요</div>
        </div>
        <div class="body">분양가 상승으로 <span class="highlight">시세 차익이 줄었어요</span>. 저렴하게 내 집을 마련하는 공식이 흔들리고 있어요.</div>
        <div class="bullets">
          <div class="bullet-item"><b>분양가↑:</b> 시세와 격차 축소</div>
          <div class="bullet-item"><b>당첨 후:</b> 실입주 자금 부담 증가</div>
        </div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">시리즈픽</span></div>
  </div>
</div>
</body>
</html>
