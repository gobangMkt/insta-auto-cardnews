<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; align-items:flex-start; gap:43.44px; }
  .headline { display:flex; flex-direction:row; align-items:flex-start; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .headline-text { font-weight:800; font-size:57.61px; line-height:1.2; letter-spacing:-0.02em; color:#1E2124; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:50px; width:936.08px; }
  .body-text { width:936.08px; font-weight:400; font-size:43.44px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .highlight { color:#009AB5; font-weight:700; }
  .callout { width:936.08px; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:43.21px 43.21px 46.81px; gap:14.41px; background:#E6F5EC; border-radius:21.6px; }
  .callout-title { display:flex; flex-direction:row; align-items:center; gap:14.41px; width:100%; }
  .callout-check { width:50.41px; height:50.41px; flex-shrink:0; background:#29BA66; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#FFFFFF; font-size:28px; font-weight:700; }
  .callout-title-text { font-weight:700; font-size:38.71px; line-height:160%; letter-spacing:-0.02em; color:#1E2124; }
  .callout-body { width:100%; padding-left:10.8px; font-weight:400; font-size:39.61px; line-height:160%; letter-spacing:-0.02em; color:#1E2124; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; flex-direction:row; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">👥</div>
      <div class="headline-text">대기자 매칭이 더 빨라져요</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraph">
      <p class="body-text">기존엔 공실이 생겨도 적합한 대기자를 찾는 데 시간이 걸렸어요. 단지별로 대기자를 따로 관리하다 보니 빈방이 생겨도 연결이 늦었죠.</p>
      <p class="body-text">앞으로는 <span class="highlight">유사한 평형과 단지를 묶어서</span> 통합 대기 관리를 해요. 순번도 부여하기 때문에 공실이 나면 더 빠르게 연락이 와요.</p>
      <div class="callout">
        <div class="callout-title">
          <div class="callout-check">✓</div>
          <div class="callout-title-text">대기자 제도 개선 핵심</div>
        </div>
        <div class="callout-body">· 유사 평형·단지를 묶어 통합 관리<br>· 순번 부여로 공실 발생 시 즉시 매칭<br>· 대기 중 다른 단지에도 자동 연결 가능</div>
      </div>
    </div>
  </div>
  <div class="footer"><div class="footer-divider"></div><div class="footer-text"><span class="footer-label">시리즈픽</span></div></div>
</div>
</body>
</html>
