<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:86.88px; display:flex; flex-direction:column; align-items:flex-start; gap:57.61px; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:63.35px; width:936.08px; }
  .body-text { width:936.08px; font-weight:400; font-size:43.44px; line-height:130%; letter-spacing:-0.02em; color:#1E2124; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; flex-direction:row; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="paragraph">
      <p class="body-text">기존에는 LH 공공임대 정기모집이 <span class="highlight">연 7회</span>뿐이었어요. 언제 공고가 뜨는지 예측하기 어렵고, 타이밍을 한 번 놓치면 몇 달씩 기다려야 했죠.</p>
      <p class="body-text">2026년부터 이 구조가 달라져요. 정기모집 횟수가 늘어나고, 공고일이 지역별로 고정되고, 공실 정보도 직접 볼 수 있어요.</p>
      <p class="body-text">자격검증도 한 번만 받으면 1년 동안 유지돼서, 여러 단지에 넣을 때마다 반복할 필요가 없어요. 오늘은 바뀐 제도 전체를 항목별로 정리해볼게요.</p>
    </div>
  </div>
  <div class="footer"><div class="footer-divider"></div><div class="footer-text"><span class="footer-label">시리즈픽</span></div></div>
</div>
</body>
</html>
