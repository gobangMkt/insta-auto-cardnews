<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; gap:43.44px; }
  .headline { display:flex; align-items:flex-start; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; }
  .headline-text { font-weight:800; font-size:57.61px; line-height:1.2; letter-spacing:-0.02em; color:#1E2124; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; }
  .paragraph { display:flex; flex-direction:column; gap:40px; width:936.08px; }
  .body-text { width:936.08px; font-weight:400; font-size:41px; line-height:145%; letter-spacing:-0.02em; color:#1E2124; }
  .highlight { color:#009AB5; font-weight:700; }
  .callout { width:936.08px; display:flex; flex-direction:column; align-items:flex-start; padding:40px; gap:14.41px; background:#E6F5EC; border-radius:21.6px; }
  .callout-title { display:flex; align-items:center; gap:14.41px; width:100%; }
  .callout-check { width:50.41px; height:50.41px; flex-shrink:0; background:#29BA66; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#FFFFFF; font-size:28px; font-weight:700; }
  .callout-title-text { font-weight:700; font-size:38.71px; letter-spacing:-0.02em; color:#1E2124; }
  .callout-body { width:100%; padding-left:10.8px; font-weight:400; font-size:34px; line-height:160%; letter-spacing:-0.02em; color:#1E2124; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">💸</div>
      <div class="headline-text">월세만 보면 속아요</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraph">
      <p class="body-text">월세 단독으로 비교하지 말고 <span class="highlight">관리비 포함 총 월 납부액</span>을 기준으로 봐야 해요. 전기·수도·가스·인터넷·에어컨·난방 추가요금이 더해지면 실제 부담이 훨씬 커질 수 있어요.</p>
      <div class="callout">
        <div class="callout-title">
          <div class="callout-check">✓</div>
          <div class="callout-title-text">계약 전 비용 확인 항목</div>
        </div>
        <div class="callout-body">· 관리비에 포함된 항목 목록 요청<br>· 에어컨·난방 추가요금 여부<br>· 보증금 환불 기준 및 소요 기간<br>· 중도 퇴실 시 위약금 조건</div>
      </div>
    </div>
  </div>
  <div class="footer"><div class="footer-divider"></div><div class="footer-text"><span class="footer-label">시리즈픽</span></div></div>
</div>
</body>
</html>
