<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#1E2124; }
  .bg-img { position:absolute; width:1080px; height:1350px; left:0; top:0; object-fit:cover; object-position:center center; }
  .gradient { position:absolute; width:1080px; height:1350px; left:0; top:0; background:linear-gradient(180deg, rgba(30,33,36,1) 8.3%, rgba(30,33,36,0) 65%); transform:rotate(-180deg); }
  .headline { position:absolute; width:960px; left:48px; top:820px; display:flex; flex-direction:column; align-items:flex-start; z-index:2; }
  .hl-line { width:960px; height:136px; font-weight:700; font-size:100px; line-height:135%; letter-spacing:-0.05em; color:#FFFFFF; -webkit-text-stroke:4px #000000; paint-order:stroke fill; display:flex; align-items:center; }
  .hl-line .key { color:#00FFFF; }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg-img" src="../img/333797d3-1913-4e8b-8e0e-1ce868e0b84a.webp" alt="">
  <div class="gradient"></div>
  <div class="headline">
    <div class="hl-line">서울 고시텔 고를 때</div>
    <div class="hl-line"><span class="key">이것만 보면 돼요</span></div>
  </div>
</div>
</body>
</html>
