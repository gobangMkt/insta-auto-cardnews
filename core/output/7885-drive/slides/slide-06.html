<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .outer {
    position:absolute;
    width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:45.25px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:center; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .hl-text {
    font-weight:800; font-size:57.61px; line-height:68.78px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED;
    flex-shrink:0;
  }
  .slide-img {
    width:934px; height:380px;
    border-radius:27.15px;
    object-fit:cover;
    background:#D9D9D9;
    flex-shrink:0;
  }
  .content-group {
    display:flex; flex-direction:column; align-items:flex-start; gap:20px;
    width:933.96px;
  }
  .paragraph {
    display:flex; flex-direction:column; align-items:flex-start; gap:10px;
    width:933.96px;
  }
  .rank-badge {
    min-width:81.45px; height:65.16px;
    background:rgba(0,154,181,0.2); border-radius:18.1px;
    display:inline-flex; align-items:center; justify-content:center;
    padding:0 16px;
    font-weight:700; font-size:43.44px;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .group-title {
    width:933.96px;
    font-weight:700; font-size:43.44px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .body {
    width:933.96px;
    font-weight:400; font-size:39.61px; line-height:150%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="outer">
    <div class="headline">
      <div class="hl-icon">&#128203;</div>
      <div class="hl-text">신청 절차, 이렇게 해요</div>
    </div>
    <div class="content-divider"></div>
    <img class="slide-img" src="../img/61255769-04c8-4766-af70-0e09a22e4e7d.jpg" alt="">
    <div class="content-group">
      <div class="paragraph">
        <div style="display:flex;flex-direction:row;align-items:center;gap:18.1px;">
          <div class="rank-badge">1단계</div>
          <div class="group-title">서울주거포털 추천서 발급 신청</div>
        </div>
        <div class="body"><span class="highlight">소득 심사 없이</span> 바로 접수 가능. 은행 대출 심사로 통합됐어요.</div>
      </div>
      <div class="paragraph">
        <div style="display:flex;flex-direction:row;align-items:center;gap:18.1px;">
          <div class="rank-badge">2단계</div>
          <div class="group-title">하나은행 상담 → 임대차계약 → 대출 신청</div>
        </div>
        <div class="body">추천서 받은 후 하나은행에서 대출 상담·계약·신청까지 순서대로 진행해요.</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">고방 | 1인 NEWS</span></div>
  </div>
</div>
</body>
</html>
