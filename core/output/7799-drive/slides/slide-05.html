<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; align-items:flex-start; gap:40px; }
  .headline { display:flex; align-items:flex-start; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .headline-text { font-weight:800; font-size:57.61px; line-height:1.2; letter-spacing:-0.02em; color:#1E2124; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:28px; width:936.08px; }
  .body-text { width:936.08px; font-weight:400; font-size:40px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .cell-img { width:924.91px; height:360px; border-radius:27.15px; object-fit:cover; background:#D9D9D9; flex-shrink:0; }
  .bullets { display:flex; flex-direction:column; gap:9px; width:936.08px; padding-left:18.1px; }
  .bullet-item { position:relative; padding-left:32.41px; font-weight:400; font-size:37px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .bullet-item::before { content:'•'; position:absolute; left:0; top:0; font-weight:700; color:#1E2124; }
  .bullet-item b { font-weight:700; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">📱</div>
      <div class="headline-text">어디서 신청하나요?</div>
    </div>
    <div class="paragraph">
      <p class="body-text">온라인과 오프라인 두 경로로 신청할 수 있어요. <span class="highlight">편한 방법을 골라서</span> 신청하면 돼요.</p>
      <img class="cell-img" src="../img/3bc75bf7-ce10-48df-b4e3-9caabfe9c84b.webp" alt="">
      <div class="bullets">
        <div class="bullet-item"><b>온라인:</b> 지역사랑상품권 앱 / 카드사 홈페이지·앱·콜센터·ARS</div>
        <div class="bullet-item"><b>오프라인:</b> 주소지 관할 읍면동 주민센터 / 제휴 은행 영업점</div>
      </div>
      <p class="body-text">스마트폰이 어렵다면 주민센터에 직접 방문해도 돼요. 신분증 챙기는 거 잊지 마세요.</p>
    </div>
  </div>
  <div class="footer"><div class="footer-divider"></div><div class="footer-text"><span class="footer-label">시리즈픽</span></div></div>
</div>
</body>
</html>
