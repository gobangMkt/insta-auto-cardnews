<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .outer { position:absolute; width:1080px; height:auto; left:0; top:115.22px; display:flex; flex-direction:column; align-items:center; gap:45.25px; }
  .headline { display:flex; align-items:center; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .hl-text { font-weight:800; font-size:57.61px; line-height:68.78px; letter-spacing:-0.02em; color:#1E2124; }
  .headline-divider { width:1080px; height:9.05px; background:#DAE2ED; flex-shrink:0; }
  .slide-img { width:934px; height:360px; border-radius:27.15px; object-fit:cover; background:#D9D9D9; flex-shrink:0; }
  .content-group { display:flex; flex-direction:column; align-items:flex-start; gap:28px; width:933.96px; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:14px; width:933.96px; }
  .item-row { display:flex; align-items:center; gap:18.1px; width:933.96px; }
  .rank-badge { min-width:81.45px; height:65.16px; background:rgba(0,154,181,0.2); border-radius:18.1px; display:inline-flex; align-items:center; justify-content:center; padding:0 16px; flex-shrink:0; font-weight:700; font-size:34px; letter-spacing:-0.02em; color:#1E2124; }
  .group-title { font-weight:700; font-size:40px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .body { width:933.96px; font-weight:400; font-size:38px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="outer">
    <div class="headline">
      <div class="hl-icon">⚠️</div>
      <div class="hl-text">이것만은 꼭 기억하세요</div>
    </div>
    <div class="headline-divider"></div>
    <img class="slide-img" src="../img/a3b28d16-ef6d-4b59-b70e-90042a8bd42e.webp" alt="">
    <div class="content-group">
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">주의 1</div>
          <div class="group-title">1차 완료 시 2차 신청 불가</div>
        </div>
        <div class="body">1차에 이미 신청·지급을 받았다면 <span class="highlight">2차에는 신청 자체가 안 돼요.</span> 중복 신청은 불가해요.</div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">주의 2</div>
          <div class="group-title">8월 31일 이후엔 소멸</div>
        </div>
        <div class="body">받은 지원금을 <span class="highlight">2026.8.31까지 쓰지 않으면</span> 그냥 사라져요. 잊지 말고 기한 전에 꼭 사용하세요.</div>
      </div>
    </div>
  </div>
  <div class="footer"><div class="footer-divider"></div><div class="footer-text"><span class="footer-label">시리즈픽</span></div></div>
</div>
</body>
</html>
