<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  /* ===== slide-cover (1080×1350) ===== */
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#1E2124;
  }
  .bg-img {
    position:absolute;
    width:1978.27px; height:1380.34px;
    left:calc(50% - 989.135px); top:-30.01px;
    object-fit:cover;
  }
  .gradient {
    position:absolute; width:1080px; height:1350px; left:0; top:0;
    background:linear-gradient(180deg, rgba(30,33,36,1) 8.3%, rgba(30,33,36,0) 65%);
    transform:rotate(-180deg);
  }
  .headline {
    position:absolute;
    width:960.19px;
    left:47.99px; top:870.58px;
    display:flex; flex-direction:column; align-items:flex-start;
    z-index:2;
  }
  .hl-line {
    width:960.19px; height:135.75px;
    font-weight:700; font-size:100.02px;
    line-height:135%; letter-spacing:-0.05em; color:#FFFFFF;
    -webkit-text-stroke:4px #000000; paint-order:stroke fill;
    display:flex; align-items:center;
  }
  .hl-line .key { color:#00FFFF; }
  .bubble {
    position:absolute;
    background:#FFFFFF; border-radius:54.29px;
    padding:28.91px 50.71px;
    font-weight:700; font-size:43.44px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
    box-shadow:0 7.24px 18.1px rgba(0,0,0,0.12);
    z-index:2;
  }
  .bubble::after {
    content:''; position:absolute;
    width:43.44px; height:43.44px;
    background:#FFFFFF;
    bottom:-12.67px; left:50%; transform:translateX(-50%) rotate(45deg);
    box-shadow:5.43px 5.43px 9.05px rgba(0,0,0,0.05);
  }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
    z-index:3;
  }
  .footer-divider { width:100%; height:1.79px; background:rgba(255,255,255,0.3); }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
<div class="canvas">
  <img class="bg-img" src="https://image.neoflat.net/BDKO-f-MGBbhvv4rBax0HdYVOsc=/1440x400/filters:no_upscale()/community/7889/fac3b89c-4ce6-4c9d-9b7b-081c5bda21d7.jpg" alt="">
  <div class="gradient"></div>
  <div class="bubble" style="top:140px; right:80px;">여름 여행 준비 중이라면</div>
  <div class="headline">
    <div class="hl-line">올여름 여행</div>
    <div class="hl-line"><span class="key">최대 7만 원 할인</span></div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">고방 | 1인 NEWS</span></div>
  </div>
</div>
</body>
</html>
