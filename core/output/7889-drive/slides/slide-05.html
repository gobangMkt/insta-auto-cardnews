<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:center; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED; flex-shrink:0;
  }
  .body-text {
    width:936.08px;
    font-weight:400; font-size:43.44px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .list-items {
    display:flex; flex-direction:column; gap:32.18px;
    width:936.08px;
  }
  .list-item {
    display:flex; flex-direction:column; gap:10.8px;
    width:936.08px;
    background:#FFFFFF; border-radius:18.1px;
    padding:28.91px 32.18px;
    border:1.79px solid #DAE2ED;
  }
  .item-header {
    display:flex; flex-direction:row; align-items:center; gap:18.1px;
  }
  .rank-badge {
    width:57.61px; height:57.61px; border-radius:50%;
    background:rgba(0,154,181,0.2);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:32.41px; color:#009AB5;
    flex-shrink:0;
  }
  .group-title {
    font-weight:700; font-size:39.61px; line-height:1.3;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .item-body {
    font-weight:400; font-size:36.01px; line-height:140%;
    letter-spacing:-0.02em; color:#4A5568;
    padding-left:75.71px;
  }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">📅</div>
      <div class="headline-text">6월 11일 오전 10시, 이렇게 받아요</div>
    </div>
    <div class="content-divider"></div>
    <div class="list-items">
      <div class="list-item">
        <div class="item-header">
          <div class="rank-badge">1</div>
          <div class="group-title">공식 홈페이지 또는 OTA 채널 접속</div>
        </div>
        <div class="item-body">ktostay.visitkorea.or.kr 또는 제휴 OTA에서 발급 가능해요</div>
      </div>
      <div class="list-item">
        <div class="item-header">
          <div class="rank-badge">2</div>
          <div class="group-title">6월 11일 오전 10시 이후 선착순 발급</div>
        </div>
        <div class="item-body">30만 장 한정이에요. 늦으면 소진될 수 있어요</div>
      </div>
      <div class="list-item">
        <div class="item-header">
          <div class="rank-badge">3</div>
          <div class="group-title">발급 당일 안에 예약까지 완료</div>
        </div>
        <div class="item-body"><span class="highlight">발급 당일 오전 10시 ~ 다음 날 오전 7시</span>까지 예약 완료 필수</div>
      </div>
      <div class="list-item">
        <div class="item-header">
          <div class="rank-badge">4</div>
          <div class="group-title">행사 기간 내 체크인</div>
        </div>
        <div class="item-body">체크인 날짜가 6월 11일 ~ 7월 31일 사이여야 해요</div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">고방 | 1인 NEWS</span></div>
  </div>
</div>
</body>
</html>
