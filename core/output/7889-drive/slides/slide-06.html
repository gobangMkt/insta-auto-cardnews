<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas {
    position:relative; width:1080px; height:1350px;
    overflow:hidden; word-break:keep-all;
    font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background:#F8FAFD;
  }
  .content-group {
    position:absolute; width:936.08px; height:auto;
    left:72.02px; top:115.22px;
    display:flex; flex-direction:column; align-items:flex-start; gap:43.44px;
  }
  .headline {
    display:flex; flex-direction:row; align-items:center; gap:14.48px;
    width:933.96px;
  }
  .hl-icon {
    width:63.35px; height:63.35px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:50px; line-height:1;
  }
  .headline-text {
    font-weight:800; font-size:57.61px; line-height:1.2;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .content-divider {
    width:100%; height:9.05px;
    background:#DAE2ED; flex-shrink:0;
  }
  .body-text {
    width:936.08px;
    font-weight:400; font-size:43.44px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
  }
  .highlight { color:#009AB5; font-weight:700; }
  .cell-img {
    width:936.08px; height:380px;
    object-fit:cover; border-radius:18.1px;
    flex-shrink:0;
  }
  .bullets {
    display:flex; flex-direction:column; gap:18.1px;
    width:936.08px;
  }
  .bullet-item {
    display:flex; flex-direction:row; align-items:flex-start; gap:14.48px;
    width:936.08px;
  }
  .bullet-dot {
    width:14.48px; height:14.48px; border-radius:50%;
    background:#009AB5; flex-shrink:0; margin-top:17px;
  }
  .bullet-text {
    font-weight:400; font-size:39.61px; line-height:140%;
    letter-spacing:-0.02em; color:#1E2124;
    flex:1;
  }
  .bullet-key { color:#009AB5; font-weight:700; }
  .footer {
    position:absolute; width:936.08px; height:61.41px;
    left:72.02px; bottom:66.61px;
    display:flex; flex-direction:column; align-items:flex-end; gap:21.61px;
  }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text {
    width:100%;
    display:flex; flex-direction:row; justify-content:space-between; align-items:center;
  }
  .footer-label {
    font-weight:600; font-size:32.41px; line-height:38.01px; color:#BAC5D4;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">⚠️</div>
      <div class="headline-text">발급받고 예약 안 하면 소멸돼요</div>
    </div>
    <div class="content-divider"></div>
    <p class="body-text">발급받은 당일 안에 예약까지 끝내야 해요. 이걸 모르고 발급만 받아두면 쓸 수 없어요.</p>
    <img class="cell-img" src="../img/29c5813e-4dd6-4454-9d17-cd89c6cb76ec.jpg" alt="여행 풍경">
    <div class="bullets">
      <div class="bullet-item">
        <div class="bullet-dot"></div>
        <span class="bullet-text"><span class="bullet-key">소멸 조건:</span> 다음 날 오전 7시까지 예약 미완료 시 자동 소멸</span>
      </div>
      <div class="bullet-item">
        <div class="bullet-dot"></div>
        <span class="bullet-text"><span class="bullet-key">재발급:</span> 다음 날 오전 10시부터 다시 발급 가능해요</span>
      </div>
      <div class="bullet-item">
        <div class="bullet-dot"></div>
        <span class="bullet-text">재발급도 선착순이라 재고가 남아있어야 해요</span>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-divider"></div>
    <div class="footer-text"><span class="footer-label">고방 | 1인 NEWS</span></div>
  </div>
</div>
</body>
</html>
