<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; align-items:flex-start; gap:43.44px; }
  .headline { display:flex; align-items:flex-start; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .headline-text { font-weight:800; font-size:57.61px; line-height:1.2; letter-spacing:-0.02em; color:#1E2124; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0; }
  .paragraph { display:flex; flex-direction:column; align-items:flex-start; gap:40px; width:936.08px; }
  .body-text { width:936.08px; font-weight:400; font-size:41px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .highlight { color:#009AB5; font-weight:700; }
  .callout { width:936.08px; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:43.21px; gap:14.41px; background:#E6F5EC; border-radius:21.6px; }
  .callout-title { display:flex; align-items:center; gap:14.41px; width:100%; }
  .callout-check { width:50.41px; height:50.41px; flex-shrink:0; background:#29BA66; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#FFFFFF; font-size:28px; font-weight:700; }
  .callout-title-text { font-weight:700; font-size:38.71px; line-height:160%; letter-spacing:-0.02em; color:#1E2124; }
  .callout-body { width:100%; padding-left:10.8px; font-weight:400; font-size:37px; line-height:160%; letter-spacing:-0.02em; color:#1E2124; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">📍</div>
      <div class="headline-text">어디에 지어지나요</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraph">
      <p class="body-text">이 사업의 핵심은 '어디에 공급하느냐'예요. 교통이 편리하고 생활 인프라가 갖춰진 곳을 우선으로 선정하기 때문에, 신축보다 <span class="highlight">생활 편의성이 오히려 높을 수 있어요.</span></p>
      <div class="callout">
        <div class="callout-title">
          <div class="callout-check">✓</div>
          <div class="callout-title-text">우수 입지 선정 기준</div>
        </div>
        <div class="callout-body">· 역·정류장까지 도보로 이동 가능<br>· 편의점·마트·병원 등 생활 인프라 밀집<br>· 야간 안전성 확보된 지역<br>· 직장·학교까지 이동 동선이 단순한 곳</div>
      </div>
      <p class="body-text">입지 기준이 이렇게 구체적으로 정해진 만큼, 공급된 물량이라면 생활 여건은 믿을 수 있어요.</p>
    </div>
  </div>
  <div class="footer"><div class="footer-divider"></div><div class="footer-text"><span class="footer-label">시리즈픽</span></div></div>
</div>
</body>
</html>
