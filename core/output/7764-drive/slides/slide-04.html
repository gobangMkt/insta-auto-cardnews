<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  .canvas { position:relative; width:1080px; height:1350px; overflow:hidden; word-break:keep-all; font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#F8FAFD; }
  .content-group { position:absolute; width:936.08px; height:auto; left:72.02px; top:115.22px; display:flex; flex-direction:column; align-items:flex-start; gap:43.44px; }
  .headline { display:flex; align-items:center; gap:14.48px; width:933.96px; }
  .hl-icon { width:63.35px; height:63.35px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:50px; line-height:1; }
  .hl-text { font-weight:800; font-size:57.61px; line-height:68.78px; letter-spacing:-0.02em; color:#1E2124; }
  .content-divider { width:100%; height:9.05px; background:#DAE2ED; flex-shrink:0; }
  .paragraphs { display:flex; flex-direction:column; gap:43.44px; width:936.08px; }
  .paragraph { display:flex; flex-direction:column; gap:18.1px; width:936.08px; }
  .item-row { display:flex; align-items:center; gap:18.1px; width:936.08px; }
  .rank-badge { min-width:81.45px; height:65.16px; background:rgba(0,154,181,0.2); border-radius:18.1px; display:inline-flex; align-items:center; justify-content:center; padding:0 16px; flex-shrink:0; font-weight:700; font-size:36px; letter-spacing:-0.02em; color:#1E2124; }
  .group-title { font-weight:700; font-size:43.44px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .body { width:936.08px; font-weight:400; font-size:40px; line-height:150%; letter-spacing:-0.02em; color:#1E2124; }
  .bullets { display:flex; flex-direction:column; gap:9.05px; width:936.08px; padding-left:18.1px; }
  .bullet-item { position:relative; padding-left:32.41px; font-weight:400; font-size:37px; line-height:140%; letter-spacing:-0.02em; color:#1E2124; }
  .bullet-item::before { content:'•'; position:absolute; left:0; top:0; font-weight:700; color:#1E2124; }
  .bullet-item b { font-weight:700; }
  .highlight { color:#009AB5; font-weight:700; }
  .footer { position:absolute; width:936.08px; height:61.41px; left:72.02px; bottom:66.61px; display:flex; flex-direction:column; align-items:flex-end; gap:21.61px; }
  .footer-divider { width:100%; height:1.79px; background:#DAE2ED; }
  .footer-text { width:100%; display:flex; justify-content:space-between; align-items:center; }
  .footer-label { font-weight:600; font-size:32.41px; color:#BAC5D4; }
</style>
</head>
<body>
<div class="canvas">
  <div class="content-group">
    <div class="headline">
      <div class="hl-icon">📋</div>
      <div class="hl-text">두 가지 방식으로 추진해요</div>
    </div>
    <div class="content-divider"></div>
    <div class="paragraphs">
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">방식 1</div>
          <div class="group-title">LH 직접매입</div>
        </div>
        <div class="body">공공이 먼저 매입한 뒤 리모델링을 진행해요. <span class="highlight">입지가 좋은 곳을 선점</span>할 수 있다는 게 가장 큰 장점이에요.</div>
        <div class="bullets">
          <div class="bullet-item"><b>주체:</b> LH가 직접 매입·운영</div>
          <div class="bullet-item"><b>장점:</b> 우수 입지 우선 확보 가능</div>
        </div>
      </div>
      <div class="paragraph">
        <div class="item-row">
          <div class="rank-badge">방식 2</div>
          <div class="group-title">매입약정</div>
        </div>
        <div class="body">민간이 리모델링을 마친 뒤 LH가 매입하는 구조예요. 민간의 자본과 역량을 활용해서 공급 속도를 높일 수 있어요.</div>
        <div class="bullets">
          <div class="bullet-item"><b>주체:</b> 민간이 시공 후 LH에 매도</div>
          <div class="bullet-item"><b>장점:</b> 민간 역량 활용으로 공급 확대</div>
        </div>
      </div>
    </div>
  </div>
  <div class="footer"><div class="footer-divider"></div><div class="footer-text"><span class="footer-label">시리즈픽</span></div></div>
</div>
</body>
</html>
